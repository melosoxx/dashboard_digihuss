[functions]
  directory = "netlify/functions"

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_APP_URL,SUPABASE_SERVICE_ROLE_KEY,CREDENTIAL_ENCRYPTION_KEY,SHOPIFY_ADMIN_ACCESS_TOKEN,SHOPIFY_STORE_DOMAIN,SHOPIFY_ADMIN_API_VERSION,META_ACCESS_TOKEN,META_AD_ACCOUNT_ID,META_API_VERSION,CLARITY_API_TOKEN,CLARITY_PROJECT_ID,CRON_SECRET"

[[headers]]
  for = "/api/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
